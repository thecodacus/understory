# Portainer stack — pulls the prebuilt image from GHCR (no build step).
# Point Portainer at this file (Stacks → Add stack → Repository) and set
# the LLM env vars in the stack's environment variables UI.
services:
  understory:
    image: ghcr.io/thecodacus/understory:latest
    ports:
      - "3800:3800"
    volumes:
      # Persistent OKF bundle. Swap for a bind mount (e.g. /srv/okf-bundle:/bundle)
      # if you want to edit the markdown from the host / sync it with git.
      - okf-bundle:/bundle
    environment:
      BUNDLE_ROOT: /bundle
      AUTH_TOKEN: ${AUTH_TOKEN:-}
      # Primary model
      LLM_API_BASE_URL: ${LLM_API_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_FORMAT: ${LLM_API_FORMAT:-openai}
      LLM_MODEL: ${LLM_MODEL:-}
      # Fallback model
      LLM_FALLBACK_API_BASE_URL: ${LLM_FALLBACK_API_BASE_URL:-}
      LLM_FALLBACK_API_KEY: ${LLM_FALLBACK_API_KEY:-}
      LLM_FALLBACK_API_FORMAT: ${LLM_FALLBACK_API_FORMAT:-openai}
      LLM_FALLBACK_MODEL: ${LLM_FALLBACK_MODEL:-}
      LLM_FALLBACK_ALLOW_FOR: ${LLM_FALLBACK_ALLOW_FOR:-query}
      # Legacy compat (still supported)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LLAMACPP_BASE_URL: ${LLAMACPP_BASE_URL:-}
      LLAMACPP_API_KEY: ${LLAMACPP_API_KEY:-}
      LOCAL_BASE_URL: ${LOCAL_BASE_URL:-}
      LOCAL_API_KEY: ${LOCAL_API_KEY:-}
      GIT_AUTOCOMMIT: ${GIT_AUTOCOMMIT:-false}
    restart: unless-stopped

volumes:
  okf-bundle:
